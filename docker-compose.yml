services:
  postgres:
    image: postgres:15-alpine
    container_name: anhoc-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-anhoc}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-anhoc}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mongodb:
    image: mongo:6.0
    container_name: anhoc-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mailhog:
    image: mailhog/mailhog:latest
    container_name: anhoc-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: anhoc-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: anhoc-backend
    ports:
      - "5001:5001"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/anhoc?sslmode=disable}
      JWT_SECRET: ${JWT_SECRET:-this-is-a-long-dev-jwt-secret-key-32-chars-at-least}
      SERVER_PORT: 5001
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5000}
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_FROM: ${SMTP_FROM:-no-reply@anhoc.local}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
    depends_on:
      mailhog:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5001/api/v1/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  chatbot:
    build:
      context: ./chatbot
      dockerfile: Dockerfile
    container_name: anhoc-chatbot
    ports:
      - "5002:5002"
    environment:
      PORT: 5002
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/anhoc?sslmode=disable}
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017/math_tutor}
      JWT_SECRET: ${JWT_SECRET:-this-is-a-long-dev-jwt-secret-key-32-chars-at-least}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-mock_key_for_local_healthcheck_purposes}
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5002/health').getcode() == 200 or exit(1)"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: anhoc-frontend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: ${NODE_ENV:-development}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
      NEXT_PUBLIC_CHATBOT_API_URL: ${NEXT_PUBLIC_CHATBOT_API_URL:-/}
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://backend:5001}
      BACKEND_URL: ${BACKEND_URL:-http://backend:5001}
      CHATBOT_URL: http://chatbot:5002
    depends_on:
      backend:
        condition: service_healthy
      chatbot:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5000/').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
