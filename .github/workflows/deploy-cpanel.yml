name: Deploy to cPanel via FTP

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build Frontend & Deploy via FTP
    runs-on: ubuntu-latest

    steps:
      - name: 🔍 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: 📦 Install Frontend Dependencies
        run: |
          npm ci --prefix frontend

      - name: 🚀 Build Frontend (Next.js)
        run: |
          npm run build --prefix frontend
        env:
          # Set build time environment variables if needed
          NEXT_PUBLIC_API_URL: /api/v1
          NEXT_PUBLIC_CHATBOT_API_URL: /
          NODE_ENV: production

      - name: 📂 Deploy files via SFTP to cPanel
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          username: ${{ secrets.FTP_USERNAME }}
          server: ${{ secrets.FTP_SERVER }}
          port: ${{ secrets.FTP_PORT || 22 }}
          password: ${{ secrets.FTP_PASSWORD }}
          local_path: './'
          remote_path: ${{ secrets.FTP_REMOTE_PATH }}
          sftp_only: true
          sftpArgs: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
          rsyncArgs: '--exclude=node_modules --exclude=.git --exclude=.github --exclude=chatbot/.venv --exclude=chatbot/__pycache__ --exclude=backend/*.log --exclude=docs --exclude=.gitignore --exclude=README.md --exclude=TODO.md --exclude=docker-compose.yml --exclude=run_all.*'
