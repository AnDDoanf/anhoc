name: Build and Push to cPanel Deploy Branch

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    name: Build Frontend & Push to Deploy Branch
    runs-on: ubuntu-latest

    steps:
      - name: 🔍 Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: 📦 Install Frontend Dependencies
        run: |
          npm ci --prefix frontend

      - name: 🚀 Build Frontend (Next.js)
        run: |
          npm run build --prefix frontend
        env:
          NEXT_PUBLIC_API_URL: /api/v1
          NEXT_PUBLIC_CHATBOT_API_URL: /
          NODE_ENV: production

      - name: 📦 Install Backend Dependencies
        run: |
          npm ci --prefix backend

      - name: 🚀 Build Backend (TS Compilation via Esbuild)
        run: |
          npx esbuild backend/server.ts --bundle --platform=node --target=node20 --outfile=backend/dist/server.cjs --external:pg-native --external:@prisma/client --format=cjs

      - name: 🚀 Force Commit and Push to deploy-cpanel branch
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          # Create and switch to deploy-cpanel branch
          git checkout -B deploy-cpanel
          
          # Force add the built .next folder (even though it is in .gitignore)
          git add -f frontend/.next/
          
          # Add the compiled backend files
          git add backend/dist/
          git add backend/passenger_entry.js
          
          git commit -m "build: compile assets for cpanel deployment"
          
          # Push to deploy-cpanel branch, overwriting history to keep repo size clean
          git push origin deploy-cpanel --force
