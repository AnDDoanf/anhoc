name: Render Keepalive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render health endpoint
        run: |
          curl --fail --silent --show-error --max-time 30 \
            https://anhoc.onrender.com/api/v1/health
